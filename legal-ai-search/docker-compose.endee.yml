version: '3.8'

services:
  endee-server:
    image: endee/endee-server:latest
    container_name: endee-server
    ports:
      - "8081:8081"
    volumes:
      - endee-data:/data
    environment:
      - ENDEE_PORT=8081
      - ENDEE_HOST=0.0.0.0
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/health"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  endee-data:
    driver: local
